<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark light">
  <title>Routa — {{ company if company else "вход" }}</title>
  <script>(function(){try{var t=localStorage.getItem('routa_theme');
    if(t==='light'||t==='dark')document.documentElement.dataset.theme=t;}catch(e){}})();</script>
  <style>
    :root { --bg:#0f1115; --card:#1a1d24; --line:#2a2f3a; --txt:#e6e8ec;
            --muted:#9aa3b2; --green:#3fb950; --red:#f85149; --accent:#58a6ff; }
    @media (prefers-color-scheme: light){
      :root:not([data-theme="dark"]){ --bg:#f4f6f9; --card:#ffffff; --line:#d6dbe3;
        --txt:#1a1d24; --muted:#5b6573; --green:#1a7f37; --red:#cf222e; --accent:#0969da; }
    }
    :root[data-theme="light"]{ --bg:#f4f6f9; --card:#ffffff; --line:#d6dbe3;
      --txt:#1a1d24; --muted:#5b6573; --green:#1a7f37; --red:#cf222e; --accent:#0969da; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--txt);
           font:15px/1.5 -apple-system,Segoe UI,Roboto,sans-serif; }
    .wrap { max-width:760px; margin:0 auto; padding:20px 16px 60px; }
    h1 { font-size:20px; margin:8px 0 4px; }
    .muted { color:var(--muted); font-size:13px; }
    .cards { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:18px 0; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px; }
    .card .label { color:var(--muted); font-size:12px; }
    .card .val { font-size:20px; font-weight:600; margin-top:4px; }
    .pos { color:var(--green); } .neg { color:var(--red); }
    section { background:var(--card); border:1px solid var(--line);
              border-radius:12px; padding:14px 16px; margin:14px 0; }
    section h2 { font-size:14px; color:var(--muted); margin:0 0 10px;
                 text-transform:uppercase; letter-spacing:.04em; }
    .row { display:flex; justify-content:space-between; padding:7px 0;
           border-bottom:1px solid var(--line); }
    .row:last-child { border-bottom:none; }
    .bar { height:6px; background:var(--accent); border-radius:3px; margin-top:4px; }
    .num { font-variant-numeric:tabular-nums; }
    a.btn { display:inline-block; background:var(--accent); color:#fff;
            text-decoration:none; padding:10px 18px; border-radius:8px; }
  </style>
</head>
<body><div class="wrap">{% block body %}{% endblock %}</div></body>
</html>
